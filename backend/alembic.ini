# Alembic config.
# The DB URL is NOT hardcoded here; migrations/env.py injects it from
# the project's db_config.json (DATABASE_URL). See migrations/README.md.
# NOTE: keep this file ASCII-only -- configparser reads it with the OS
# locale codec (gbk on Windows) and fails on non-ASCII bytes.

[alembic]
# Migration scripts directory (relative to backend/).
script_location = migrations

# Timestamp-prefixed migration filenames for easy ordering.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Project root when running alembic commands.
prepend_sys_path = .

# Intentionally empty: the real URL is set in env.py from db_config.json.
sqlalchemy.url =


[post_write_hooks]
# No auto-formatting hook configured.


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
